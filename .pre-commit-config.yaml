# Pre-commit hooks — mirror the CI `inv lint` job (black, isort, flake8, mypy)
# so formatting/type failures are caught before they reach GitHub Actions.
#
# Recommended runner: prek (https://prek.j178.dev/), a fast drop-in replacement
# for the `pre-commit` framework that reads this same file. Plain `pre-commit`
# also works.
#
#   pipx install prek        # or: uv tool install prek / cargo install prek
#   poetry install --no-root # populate ./.venv with the pinned tools
#   prek install             # wire up the git pre-commit hook
#   prek run --all-files     # run everything on demand
#
# The hooks call the tools from the in-project virtualenv (./.venv, enforced by
# poetry.toml), so tool versions stay single-sourced in pyproject.toml — nothing
# to pin or keep in sync here. Each runs on the whole tree (like CI), which also
# lets mypy load its sqlalchemy/pydantic plugins and resolve project imports.
repos:
  - repo: local
    hooks:
      - id: black
        name: black --check
        entry: .venv/bin/black --check .
        language: system
        pass_filenames: false
        always_run: true

      - id: isort
        name: isort --sl --check-only
        entry: .venv/bin/isort --sl --check-only .
        language: system
        pass_filenames: false
        always_run: true

      - id: flake8
        name: flake8
        entry: .venv/bin/flake8 .
        language: system
        pass_filenames: false
        always_run: true

      - id: mypy
        name: mypy
        entry: .venv/bin/mypy .
        language: system
        pass_filenames: false
        always_run: true
